# EA AUTOMATIC — infraestrutura local (Fase 0).
# ISOLAMENTO TOTAL do CentraAtend: nomes/volumes/rede/portas próprios.
# Não colide com infra-db-1, infra-redis-1, infra_dbdata, rede centraatend, portas 5432/6379.
name: ea-automatic

services:
  ea-db:
    image: pgvector/pgvector:pg16
    container_name: ea-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?defina POSTGRES_USER em infra/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD em infra/.env}
      POSTGRES_DB: ${POSTGRES_DB:?defina POSTGRES_DB em infra/.env}
    ports:
      # loopback-only; porta do host isolada (5433), mapeada para a 5432 do container
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ea-dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ea-net

  ea-redis:
    image: redis:7-alpine
    container_name: ea-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    volumes:
      - ea-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ea-net

  # ai-service (FastAPI / Vertex AI / Gemini) — INT-3, Fase 4.
  # Serviço INTERNO (§A.6): SEM porta pública. Alcançável só na rede ea-net
  # via http://ea-ai:8000. Defesa em profundidade pelo header X-Internal-Token.
  ea-ai:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    container_name: ea-ai
    restart: unless-stopped
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
      GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT:-ea-v2-automatic}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      STAGING_DIR: ${STAGING_DIR:-/tmp/ea-staging}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:?defina INTERNAL_TOKEN em infra/.env}
    volumes:
      # credencial Google (Drive + Vertex AI) montada read-only; nunca commitada.
      - ../apps/ai-service/credentials.json:/app/credentials.json:ro
      # staging efêmera (§A.6) — BIND-MOUNT do MESMO path do host: o backend
      # roda no host em dev e precisa enxergar o mesmo diretório que o container.
      - ${STAGING_DIR:-/tmp/ea-staging}:${STAGING_DIR:-/tmp/ea-staging}
    healthcheck:
      # imagem slim pode não ter curl → usa urllib do próprio Python.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ea-net

volumes:
  ea-dbdata:
    name: ea-dbdata
  ea-redisdata:
    name: ea-redisdata

networks:
  ea-net:
    name: ea-automatic
