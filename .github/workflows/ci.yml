name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permissões mínimas (somente leitura do repositório).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  python:
    name: Python ai-service (ruff · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv (Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest -q
